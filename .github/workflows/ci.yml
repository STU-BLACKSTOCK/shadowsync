name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build all services
        run: docker compose build

      - name: Start services
        run: docker compose up -d

      - name: Wait for services
        run: sleep 15

      - name: Health check - Proxy
        run: curl -f http://localhost:3000/health

      - name: Test proxy mirroring
        run: |
          curl -f http://localhost:3000/items
          curl -f http://localhost:3000/__shadow/logs
          curl -f http://localhost:3000/__shadow/stats

      - name: Health check - Dashboard
        run: |
          curl -f http://localhost:5173/
          curl -f http://localhost:5173/__shadow/stats

      - name: Teardown
        run: docker compose down
